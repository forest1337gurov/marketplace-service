name: CI                       # имя workflow, видно во вкладке Actions

on:                            # когда запускать
  pull_request:                # на каждый pull request
  push:
    branches: [main]           # и на каждый push в ветку main

jobs:
  test:                        # job №1 — прогнать тесты
    runs-on: ubuntu-latest     # на свежей виртуалке с Ubuntu
    steps:
      - uses: actions/checkout@v4          # забрать код репозитория на виртуалку

      - uses: actions/setup-python@v5      # поставить Python нужной версии
        with:
          python-version: "3.11"
          cache: pip                        # кешировать зависимости между запусками

      - name: Install system deps (LightGBM needs libgomp)
        # та же системная библиотека OpenMP, что и в Dockerfile — без неё LightGBM не импортируется
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-image:                 # job №2 — проверить, что Docker-образ вообще собирается
    runs-on: ubuntu-latest
    needs: test                # стартует только если job test прошёл зелёным
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        # ${{ github.sha }} — хеш текущего коммита, используем как тег образа
        run: docker build -t marketplace-service:${{ github.sha }} .